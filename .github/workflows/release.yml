name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, publish & update cask
    runs-on: macos-15
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count works

      - name: Extract version from tag
        id: version
        run: echo "VALUE=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: ./scripts/build-release.sh "${{ steps.version.outputs.VALUE }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VALUE }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "build/BrewMenu-${VERSION}.zip"

      - name: Update Homebrew tap
        if: ${{ secrets.TAP_TOKEN != '' }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VALUE }}
        run: |
          SHA=$(shasum -a 256 "build/BrewMenu-${VERSION}.zip" | awk '{print $1}')

          git clone \
            "https://x-access-token:${TAP_TOKEN}@github.com/dotfn/homebrew-tap.git" \
            /tmp/homebrew-tap

          cd /tmp/homebrew-tap
          mkdir -p Casks

          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_PLACEHOLDER/${SHA}/g" \
            "$GITHUB_WORKSPACE/scripts/brewmenu.rb.tpl" \
            > Casks/brewmenu.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/brewmenu.rb
          git commit -m "Update brewmenu to ${VERSION}"
          git push
